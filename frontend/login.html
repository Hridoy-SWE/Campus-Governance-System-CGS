<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Governance System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="logo" style="font-size: 2rem;">CGS</div>
                <p style="color: var(--gray); margin-top: 0.5rem;">Campus Governance System</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" required 
                           placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" required 
                           placeholder="Enter your password">
                </div>

                <div class="form-group" style="text-align: right;">
                    <a href="#" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
                    Login
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e0e0e0;">
                <p style="color: var(--gray);">Don't have an account? 
                    <a href="#" style="color: var(--primary); text-decoration: none;">Contact Admin</a>
                </p>
                <p style="margin-top: 1rem;">
                    <a href="index.html" style="color: var(--gray); text-decoration: none;">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner" style="width: 20px; height: 20px; margin: 0;"></span> Logging in...';

            try {
                const credentials = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };

                const response = await API.login(credentials);
                
                // Redirect based on role
                if (response.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                showAlert('Invalid email or password', 'danger');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
