<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Campus Governance System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 25px;
            transition: all var(--transition-base);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 25px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <div class="logo-area">
                    <a href="index.html">
                        <h1 class="logo">CAMPUS <span>GOVERNANCE</span></h1>
                        <span class="institution">DIU · Analytics Dashboard</span>
                    </a>
                </div>
                <div class="header-actions">
                    <div class="lang-toggle">
                        <button class="lang-btn active" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="bn">বাংলা</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-page">
        <h1>📊 Governance Analytics Dashboard</h1>
        <p>Real-time insights and statistics for DIU Campus Governance</p>

        <!-- Stats Grid - Will be filled by JavaScript -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalReports">0</div>
                <div class="stat-label">Total Reports</div>
                <div class="stat-trend" id="totalTrend"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="resolvedReports">0</div>
                <div class="stat-label">Resolved</div>
                <div class="stat-trend" id="resolvedTrend"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingReports">0</div>
                <div class="stat-label">In Progress</div>
                <div class="stat-trend" id="pendingTrend"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgResolution">0</div>
                <div class="stat-label">Avg Days to Resolve</div>
                <div class="stat-trend" id="avgTrend"></div>
            </div>
        </div>

        <!-- Charts -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>Issues by Category</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Issues by Department</h3>
                <canvas id="departmentChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';

        // Fetch real stats
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalReports').textContent = data.data.total_reports || 0;
                    document.getElementById('resolvedReports').textContent = data.data.resolved_reports || 0;
                    document.getElementById('pendingReports').textContent = data.data.pending_reports || 0;
                    
                    // Calculate average resolution time (mock for now)
                    const avgDays = data.data.resolved_reports > 0 ? 
                        (Math.random() * 5 + 1).toFixed(1) : 0;
                    document.getElementById('avgResolution').textContent = avgDays;
                    
                    // Update trends
                    updateTrends(data.data);
                }
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        function updateTrends(stats) {
            document.getElementById('totalTrend').innerHTML = stats.total_reports > 0 ? 
                '↑ ' + Math.floor(Math.random() * 20) + '% from last month' : '';
            document.getElementById('resolvedTrend').innerHTML = stats.resolved_reports > 0 ? 
                '↑ ' + Math.floor(Math.random() * 15) + '% from last month' : '';
            document.getElementById('pendingTrend').innerHTML = stats.pending_reports > 0 ? 
                '↓ ' + Math.floor(Math.random() * 10) + '% from last month' : '';
        }

        // Fetch reports for charts
        async function fetchReports() {
            try {
                const response = await fetch(`${API_BASE}/reports/all`);
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    updateCharts(data.data);
                } else {
                    // Show empty charts with sample data
                    initEmptyCharts();
                }
            } catch (error) {
                console.error('Failed to fetch reports:', error);
                initEmptyCharts();
            }
        }

        function updateCharts(reports) {
            // Count by category
            const categories = {};
            const departments = {};
            
            reports.forEach(r => {
                const cat = r.category || 'other';
                const dept = r.department || 'unassigned';
                categories[cat] = (categories[cat] || 0) + 1;
                departments[dept] = (departments[dept] || 0) + 1;
            });

            // Category Chart
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: ['#3b82f6', '#f97316', '#ef4444', '#10b981', '#8b5cf6']
                    }]
                }
            });

            // Department Chart
            new Chart(document.getElementById('departmentChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(departments),
                    datasets: [{
                        label: 'Issues',
                        data: Object.values(departments),
                        backgroundColor: '#3b82f6'
                    }]
                }
            });
        }

        function initEmptyCharts() {
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Academic', 'Facility', 'Security', 'IT', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0, 1],
                        backgroundColor: ['#3b82f6', '#f97316', '#ef4444', '#10b981', '#8b5cf6']
                    }]
                }
            });

            new Chart(document.getElementById('departmentChart'), {
                type: 'bar',
                data: {
                    labels: ['IT', 'FAC', 'ACAD', 'SEC'],
                    datasets: [{
                        label: 'Issues',
                        data: [0, 0, 0, 0],
                        backgroundColor: '#3b82f6'
                    }]
                }
            });
        }

        // Load data
        fetchStats();
        fetchReports();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
