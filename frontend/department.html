<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal - Campus Governance System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
        }
        
        .dept-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .dept-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .dept-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .dept-info {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .dept-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.2), transparent 70%);
        }
        
        .dept-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        .dept-details {
            flex: 1;
        }
        
        .dept-details h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .dept-meta {
            display: flex;
            gap: 30px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            flex-wrap: wrap;
        }
        
        .dept-stats {
            text-align: right;
        }
        
        .dept-stats .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        
        .dept-stats .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: 500;
            border: none;
            background: none;
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .tab.active {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            align-items: center;
        }
        
        .filter-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            min-width: 150px;
            cursor: pointer;
        }
        
        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            min-width: 250px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        
        .apply-btn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .apply-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        .issues-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .issue-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .issue-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }
        
        .issue-card:hover {
            transform: translateX(5px) translateY(-2px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);
        }
        
        .issue-card:hover::before {
            transform: scaleY(1);
        }
        
        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .priority-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .priority-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .priority-dot.high { background: #f87171; box-shadow: 0 0 10px #f87171; }
        .priority-dot.medium { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        .priority-dot.low { background: #34d399; box-shadow: 0 0 10px #34d399; }
        
        .issue-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .issue-description {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .issue-meta {
            display: flex;
            gap: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .issue-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }
        
        .action-btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
            transform: translateY(-2px);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border: none;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-overdue {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .loading, .no-data {
            text-align: center;
            padding: 50px;
            background: var(--glass-bg);
            border-radius: 20px;
            color: var(--text-secondary);
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .dept-info {
                flex-direction: column;
                text-align: center;
            }
            
            .dept-meta {
                flex-direction: column;
                gap: 10px;
            }
            
            .filter-bar {
                flex-direction: column;
                border-radius: 20px;
            }
            
            .issue-actions {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <div class="logo-area">
                    <a href="index.html" class="logo-link">
                        <div class="logo-icon">
                            <i class="fas fa-university"></i>
                        </div>
                        <div class="logo-text">
                            <h1>CAMPUS <span>GOVERNANCE</span></h1>
                            <span class="institution">DIU · Department Portal</span>
                        </div>
                    </a>
                </div>
                
                <div class="header-controls">
                    <div class="theme-toggle">
                        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">
                            <i class="fas fa-moon" id="themeIcon"></i>
                        </button>
                    </div>
                    <div class="lang-toggle">
                        <button class="lang-btn active" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="bn">বাংলা</button>
                    </div>
                    <div class="auth-buttons">
                        <button class="btn-outline" onclick="window.location.href='admin/login.php'">
                            <i class="fas fa-sign-in-alt"></i> Admin Login
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="dept-page">
        <div class="dept-header">
            <h1>Department Portal</h1>
        </div>

        <!-- Department Info -->
        <div class="dept-info" id="deptInfo">
            <div class="dept-icon">
                <i class="fas fa-building"></i>
            </div>
            <div class="dept-details">
                <h2 id="deptName">Software Engineering Department</h2>
                <div class="dept-meta" id="deptMeta">
                    <span><i class="fas fa-user-tie"></i> Head: <span id="deptHead">Dr. Imran Mahmud</span></span>
                    <span><i class="fas fa-clock"></i> SLA: <span id="deptSLA">72</span> hours</span>
                    <span><i class="fas fa-calendar"></i> Member since <span id="deptSince">2020</span></span>
                </div>
            </div>
            <div class="dept-stats">
                <div class="stat-number" id="totalAssigned">0</div>
                <div class="stat-label">Total Assigned</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <button class="tab active" data-status="pending">Pending (<span id="pendingCount">0</span>)</button>
            <button class="tab" data-status="in_progress">In Progress (<span id="progressCount">0</span>)</button>
            <button class="tab" data-status="resolved">Resolved (<span id="resolvedCount">0</span>)</button>
            <button class="tab" data-status="all">All Issues (<span id="totalCount">0</span>)</button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <select class="filter-select" id="priorityFilter">
                <option value="all">All Priorities</option>
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
            </select>
            
            <select class="filter-select" id="sortFilter">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
            </select>
            
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search issues...">
            
            <button class="apply-btn" id="applyFilters">
                <i class="fas fa-filter"></i> Apply Filters
            </button>
        </div>

        <!-- Issues List -->
        <div class="issues-list" id="issuesList">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading issues from database...</p>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let allIssues = [];
        let filteredIssues = [];
        let currentStatus = 'all';
        let currentPriority = 'all';
        let currentSort = 'newest';
        let searchTerm = '';

        // Fetch all reports
        async function fetchIssues() {
            try {
                const response = await fetch(`${API_BASE}/reports/all`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    allIssues = data.data.map(issue => ({
                        ...issue,
                        // Add simulated data for demo
                        priority: ['high', 'medium', 'low'][Math.floor(Math.random() * 3)],
                        days_open: Math.floor(Math.random() * 10) + 1,
                        location: issue.location || 'Academic Building'
                    }));
                    
                    updateStats();
                    applyFilters();
                } else {
                    showError('No data returned from server');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showError('Cannot connect to server. Make sure Go backend is running on port 8080');
            }
        }

        function updateStats() {
            const total = allIssues.length;
            const pending = allIssues.filter(i => i.status === 'pending').length;
            const progress = allIssues.filter(i => i.status === 'in_progress').length;
            const resolved = allIssues.filter(i => i.status === 'resolved').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('progressCount').textContent = progress;
            document.getElementById('resolvedCount').textContent = resolved;
            document.getElementById('totalAssigned').textContent = total;
        }

        function applyFilters() {
            // Start with all issues
            filteredIssues = [...allIssues];
            
            // Filter by status (if not 'all')
            if (currentStatus !== 'all') {
                filteredIssues = filteredIssues.filter(i => i.status === currentStatus);
            }
            
            // Filter by priority
            if (currentPriority !== 'all') {
                filteredIssues = filteredIssues.filter(i => i.priority === currentPriority);
            }
            
            // Search
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredIssues = filteredIssues.filter(i => 
                    (i.title && i.title.toLowerCase().includes(term)) ||
                    (i.description && i.description.toLowerCase().includes(term)) ||
                    (i.token && i.token.toLowerCase().includes(term))
                );
            }
            
            // Sort
            if (currentSort === 'newest') {
                filteredIssues.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            } else {
                filteredIssues.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            }
            
            renderIssues();
        }

        function renderIssues() {
            const container = document.getElementById('issuesList');
            
            if (filteredIssues.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <h3>No Issues Found</h3>
                        <p>There are no issues matching your filters.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredIssues.map(issue => {
                const isOverdue = issue.days_open > 5 && issue.status !== 'resolved';
                
                return `
                <div class="issue-card">
                    <div class="issue-header">
                        <div class="priority-indicator">
                            <span class="priority-dot ${issue.priority || 'medium'}"></span>
                            <span class="report-status status-${issue.status || 'pending'}">${issue.status || 'pending'}</span>
                            ${isOverdue ? '<span class="badge badge-overdue">⚠️ Overdue</span>' : ''}
                        </div>
                        <span><i class="fas fa-hashtag"></i> ${issue.token || 'N/A'}</span>
                    </div>
                    
                    <h3 class="issue-title">${issue.title || 'Untitled'}</h3>
                    <p class="issue-description">${issue.description || 'No description'}</p>
                    
                    <div class="issue-meta">
                        <span><i class="fas fa-user-secret"></i> Anonymous</span>
                        <span><i class="fas fa-calendar"></i> ${new Date(issue.createdAt).toLocaleDateString()}</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${issue.location || 'N/A'}</span>
                        <span><i class="fas fa-clock"></i> ${issue.days_open} days</span>
                    </div>
                    
                    <div class="issue-actions">
                        <button class="action-btn" onclick="alert('Update status for ${issue.token}')">
                            <i class="fas fa-edit"></i> Update Status
                        </button>
                        <button class="action-btn" onclick="alert('Add remark for ${issue.token}')">
                            <i class="fas fa-comment"></i> Add Remark
                        </button>
                        <button class="action-btn primary" onclick="alert('Assign issue ${issue.token}')">
                            <i class="fas fa-user-plus"></i> Assign
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function showError(message) {
            document.getElementById('issuesList').innerHTML = `
                <div class="no-data">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 15px; color: #f87171;"></i>
                    <h3>Connection Error</h3>
                    <p>${message}</p>
                    <p style="margin-top: 10px; color: var(--text-muted);">Make sure your Go server is running with: <code>go run main.go</code></p>
                    <button class="retry-btn" onclick="fetchIssues()">
                        <i class="fas fa-sync-alt"></i> Retry Connection
                    </button>
                </div>
            `;
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', fetchIssues);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentStatus = this.dataset.status;
                applyFilters();
            });
        });
        
        document.getElementById('applyFilters').addEventListener('click', () => {
            currentPriority = document.getElementById('priorityFilter').value;
            currentSort = document.getElementById('sortFilter').value;
            searchTerm = document.getElementById('searchInput').value;
            applyFilters();
        });

        // Theme toggle
        window.toggleTheme = () => {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
            localStorage.setItem('cgs_theme', body.getAttribute('data-theme'));
        };

        // Load saved theme
        const savedTheme = localStorage.getItem('cgs_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    </script>
</body>
</html>
