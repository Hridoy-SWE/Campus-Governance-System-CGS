<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Department Portal Redirect</title><script>
(function(){
  const user = JSON.parse(sessionStorage.getItem('cgs_user') || 'null');
  if (user && (user.role === 'admin' || user.role === 'faculty')) {
    window.location.replace('admin/dashboard.php');
    return;
  }
  window.location.replace('dashboard.html');
})();
</script></head><body></body></html>
